<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>바른 글씨 - 맞춤법 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ebe2;
  --paper: #ffffff;
  --ink: #1a1208;
  --ink-light: #3d2e1a;
  --ink-faint: #7a6a58;
  --accent: #6b3d18;
  --accent-light: #b8622a;
  --accent-bg: #fae8d8;
  --good: #1a4d35;
  --good-bg: #d4eddf;
  --warn: #921a04;
  --warn-bg: #faddda;
  --border: #c8b89e;
  --shadow: rgba(26,18,8,0.14);
  --base: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { font-size: var(--base); }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 28px 20px 22px;
  background: var(--paper);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 3px 16px var(--shadow);
  position: relative;
}
header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 6px;
  background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-light));
}
.logo {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--accent);
}
.tagline { font-size: 0.85rem; color: var(--ink-faint); margin-top: 4px; font-weight: 500; }

/* ── MAIN ── */
main { max-width: 700px; margin: 0 auto; padding: 20px 16px 80px; }

/* ── CARD ── */
.card {
  background: var(--paper);
  border-radius: 16px;
  box-shadow: 0 4px 24px var(--shadow);
  border: 1.5px solid var(--border);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--border);
  background: #f5ede0;
}
.card-head .icon { font-size: 1.3rem; }
.card-head h2 { font-size: 1.05rem; font-weight: 700; color: var(--ink); }
.card-head .cnt { font-size: 0.82rem; color: var(--ink-faint); margin-left: auto; font-weight: 600; }

/* ── TEXTAREA ── */
.ta-wrap { padding: 16px 20px 12px; }
textarea {
  width: 100%;
  min-height: 140px;
  font-family: 'Noto Serif KR', serif;
  font-size: 1.15rem;
  line-height: 1.9;
  color: var(--ink);
  border: none; outline: none;
  resize: none;
  background: transparent;
}
textarea::placeholder { color: var(--ink-faint); font-family: 'Noto Sans KR', sans-serif; font-size: 1rem; }

/* ── VOICE ── */
.voice-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px;
  border-top: 1.5px dashed var(--border);
  background: #f5ede0;
  flex-wrap: wrap;
}
.voice-label { font-size: 0.9rem; color: var(--ink-light); white-space: nowrap; font-weight: 600; }
.voice-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: 30px;
  border: 2px solid var(--accent-light);
  background: white;
  color: var(--accent);
  font-size: 1rem; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.voice-btn:active { transform: scale(0.97); }
.voice-btn.recording {
  background: var(--warn); border-color: var(--warn); color: white;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(181,69,27,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(181,69,27,0); }
}
.rec-status { font-size: 0.85rem; color: var(--warn); font-weight: 600; display: none; }
.rec-status.show { display: block; }

/* ── BUTTONS ── */
.btn-row { display: flex; gap: 10px; padding: 14px 20px 18px; }
.btn-check {
  flex: 1; padding: 16px;
  border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--accent), #6b3f20);
  color: white;
  font-size: 1.1rem; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(139,94,60,0.3);
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-check:active { transform: scale(0.98); }
.btn-check:disabled { opacity: 0.5; }
.btn-clear {
  padding: 16px 18px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: white; color: var(--ink-light);
  font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.btn-clear:active { border-color: var(--accent); color: var(--accent); }

/* ── LOADING ── */
.loading-card {
  background: var(--paper); border-radius: 16px;
  border: 1px solid var(--border);
  padding: 40px; text-align: center; display: none;
  margin-bottom: 20px;
}
.loading-card.show { display: block; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; margin: 0 auto 16px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 1rem; color: var(--ink-light); }

/* ── RESULT ── */
.result-card {
  background: var(--paper); border-radius: 16px;
  box-shadow: 0 4px 24px var(--shadow); border: 1.5px solid var(--border);
  overflow: hidden; display: none; margin-bottom: 20px;
  animation: fadeUp 0.4s ease;
}
.result-card.show { display: block; }
@keyframes fadeUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:translateY(0); } }

.score-banner {
  padding: 18px 20px; display: flex; align-items: center; gap: 14px;
}
.score-banner.perfect { background: var(--good-bg); border-bottom: 2px solid #8ecfaa; }
.score-banner.has-errors { background: var(--warn-bg); border-bottom: 2px solid #e89e90; }
.score-emoji { font-size: 2.2rem; }
.score-text h3 { font-family: 'Noto Serif KR', serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 3px; }
.score-banner.perfect .score-text h3 { color: var(--good); }
.score-banner.has-errors .score-text h3 { color: var(--warn); }
.score-text p { font-size: 0.9rem; color: var(--ink-light); font-weight: 500; }

.corrected-sec { padding: 18px 20px; border-bottom: 1.5px solid var(--border); }
.sec-label { font-size: 0.78rem; font-weight: 700; color: var(--ink-light); letter-spacing: 1.5px; margin-bottom: 10px; }
.corrected-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.1rem; line-height: 2;
  color: var(--ink);
  background: #f5ede0; border-radius: 10px;
  padding: 14px 18px;
  border-left: 4px solid var(--accent);
}
.corrected-text mark { background: #ffe066; color: #5a3a00; padding: 1px 3px; border-radius: 3px; font-weight: 700; }

.errors-sec { padding: 18px 20px; }
.error-item {
  display: flex; gap: 12px;
  padding: 14px 16px; border-radius: 12px;
  margin-bottom: 10px;
  background: #fdf0e8; border: 1.5px solid var(--accent-light);
  animation: slideIn 0.3s ease both;
}
@keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
.err-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent); color: white;
  font-size: 0.85rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 2px;
}
.err-body { flex: 1; }
.err-words { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.word-wrong { font-family: 'Noto Serif KR', serif; font-size: 1.05rem; font-weight: 700; color: var(--warn); text-decoration: line-through; }
.word-right { font-family: 'Noto Serif KR', serif; font-size: 1.05rem; font-weight: 700; color: var(--good); }
.err-type { font-size: 0.72rem; padding: 3px 9px; border-radius: 10px; background: var(--accent); color: white; font-weight: 700; }
.err-reason { font-size: 0.92rem; color: var(--ink-light); line-height: 1.7; font-weight: 500; }
.err-example { font-size: 0.85rem; color: var(--ink-faint); margin-top: 4px; font-style: italic; font-weight: 500; }

.copy-row { padding: 14px 20px; border-top: 1.5px solid var(--border); }
.btn-copy {
  width: 100%; padding: 14px;
  border-radius: 10px; border: 2px solid var(--accent);
  background: white; color: var(--accent);
  font-size: 1rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.btn-copy:active { background: var(--accent-bg); }
.btn-copy.copied { background: var(--good-bg); border-color: var(--good); color: var(--good); }

/* ── TIPS ── */
.tips-card {
  background: var(--paper); border-radius: 16px;
  border: 1.5px solid var(--border);
  box-shadow: 0 4px 24px var(--shadow);
  padding: 20px;
}
.tips-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; margin-bottom: 14px;
}
.tips-title { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: var(--ink); }
.tips-title span { font-size: 0.72rem; color: var(--ink-faint); font-weight: 500; font-family: 'Noto Sans KR', sans-serif; }
.btn-refresh {
  font-size: 0.82rem; color: var(--accent);
  background: none; border: 2px solid var(--accent-light);
  border-radius: 20px; padding: 5px 14px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-weight: 600; transition: all 0.2s;
}
.btn-refresh:active { background: var(--accent-bg); }
.tip-item { display: flex; gap: 8px; font-size: 0.92rem; color: var(--ink-light); margin-bottom: 10px; line-height: 1.7; font-weight: 500; }
.tip-dot { color: var(--accent); flex-shrink: 0; margin-top: 2px; font-weight: 700; }
.tips-src { font-size: 0.72rem; color: var(--ink-faint); margin-top: 10px; font-weight: 500; }

/* ── 즐겨찾기 ── */
.btn-star {
  background: none; border: none; cursor: pointer;
  font-size: 1.4rem; line-height: 1;
  padding: 2px 4px; flex-shrink: 0;
  transition: transform 0.2s;
}
.btn-star:active { transform: scale(1.3); }

.saved-card {
  background: var(--paper); border-radius: 16px;
  border: 1.5px solid var(--border);
  box-shadow: 0 4px 24px var(--shadow);
  overflow: hidden; margin-bottom: 20px;
}
.saved-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--border);
  background: #f5ede0;
}
.saved-head-title { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: var(--ink); }
.saved-count { font-size: 0.82rem; color: var(--accent); font-weight: 700; }
.btn-clear-all {
  font-size: 0.8rem; color: var(--warn);
  background: none; border: 1.5px solid var(--warn);
  border-radius: 20px; padding: 4px 12px;
  cursor: pointer; font-weight: 600;
  white-space: nowrap;
}
.saved-list { padding: 12px 16px; }
.saved-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; border-radius: 12px;
  margin-bottom: 8px;
  background: #fdf0e8; border: 1.5px solid var(--accent-light);
}
.saved-item-body { flex: 1; }
.saved-words { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.saved-wrong { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: var(--warn); text-decoration: line-through; }
.saved-right { font-family: 'Noto Serif KR', serif; font-size: 1rem; font-weight: 700; color: var(--good); }
.saved-type { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--accent); color: white; font-weight: 700; }
.saved-reason { font-size: 0.88rem; color: var(--ink-light); line-height: 1.6; font-weight: 500; }
.saved-date { font-size: 0.72rem; color: var(--ink-faint); margin-top: 3px; }
.btn-del-saved { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--ink-faint); padding: 2px; flex-shrink: 0; }
.saved-empty { text-align: center; padding: 28px; color: var(--ink-faint); font-size: 0.92rem; }

/* ── 글자 크기 조절 ── */
.font-ctrl {
  position: fixed; bottom: 24px; right: 16px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 100;
}
.font-btn {
  width: 46px; height: 46px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--paper);
  color: var(--ink); font-weight: 700;
  cursor: pointer; box-shadow: 0 2px 8px var(--shadow);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.font-btn:active { border-color: var(--accent); color: var(--accent); }
.font-lbl { font-size: 0.62rem; color: var(--ink-faint); }
</style>
</head>
<body>

<header>
  <div class="logo">바른 글씨 ✏️</div>
  <p class="tagline">맞춤법과 용례를 바르게 — 쉽고 편하게</p>
</header>

<main>
  <!-- 입력 카드 -->
  <div class="card">
    <div class="card-head">
      <span class="icon">📝</span>
      <h2>글을 입력해 주세요</h2>
      <span class="cnt" id="charCount">0자</span>
    </div>
    <div class="ta-wrap">
      <textarea id="inputText"
        placeholder="여기에 글을 입력하거나 붙여넣기 하세요.&#10;예) 오늘 날씨가 참 맑네요. 오랫만에 산책을 나갔습니다."
        maxlength="2000"></textarea>
    </div>
    <div class="voice-row">
      <span class="voice-label">🎙️ 음성 입력:</span>
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
        <span id="voiceIcon">🎤</span>
        <span id="voiceText">말하기 시작</span>
      </button>
      <span class="rec-status" id="recStatus">● 녹음 중...</span>
    </div>
    <div class="btn-row">
      <button class="btn-check" id="checkBtn" onclick="checkSpelling()">맞춤법 검사하기</button>
      <button class="btn-clear" onclick="clearAll()">지우기</button>
    </div>
  </div>

  <!-- 로딩 -->
  <div class="loading-card" id="loadingCard">
    <div class="spinner"></div>
    <p class="loading-text">글을 꼼꼼히 살펴보고 있습니다...</p>
  </div>

  <!-- 결과 -->
  <div class="result-card" id="resultCard">
    <div class="score-banner" id="scoreBanner">
      <span class="score-emoji" id="scoreEmoji"></span>
      <div class="score-text">
        <h3 id="scoreTitle"></h3>
        <p id="scoreDesc"></p>
      </div>
    </div>
    <div class="corrected-sec">
      <div class="sec-label">교정된 글</div>
      <div class="corrected-text" id="correctedText"></div>
    </div>
    <div class="errors-sec" id="errorsSection"></div>
    <div class="copy-row">
      <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 교정된 글 복사하기</button>
    </div>
  </div>

  <!-- 즐겨찾기 저장 목록 -->
  <div class="saved-card" id="savedCard">

      <div>

        <div class="saved-count" id="savedCount">0개</div>
      </div>
      <button class="btn-clear-all" onclick="clearAllSaved()">전체 삭제</button>
    </div>
    <div class="saved-list" id="savedList">
      <div class="saved-empty">저장된 항목이 없습니다.<br>오류 항목의 ☆ 버튼을 눌러 저장하세요.</div>
    </div>
  </div>

  <!-- 오늘의 팁 -->
  <div class="tips-card">
    <div class="tips-head">
      <div class="tips-title">💡 오늘의 맞춤법 팁 <span>— 국립국어원 기준</span></div>
      <button class="btn-refresh" id="tipsRefreshBtn" onclick="loadTips()">🔄 새로 받기</button>
    </div>
    <div id="tipsBody">
      <div style="text-align:center;padding:20px;color:var(--ink-faint);font-size:0.9rem;">불러오는 중...</div>
    </div>
    <p class="tips-src">출처: 국립국어원 한글 맞춤법(문화체육관광부 고시 제2017-12호)</p>
  </div>
</main>

<!-- 글자 크기 조절 -->
<div class="font-ctrl">
  <button class="font-btn" onclick="changeFontSize(1)">가+</button>
  <span class="font-lbl">글자</span>
  <button class="font-btn" onclick="changeFontSize(-1)">가-</button>
</div>

    document.getElementById('recStatus').classList.remove('show');
  };

  recognition.start();
}

`당신은 국립국어원 한글 맞춤법 규정(문화체육관광부 고시 제2017-12호)을 기준으로 맞춤법을 검사하는 전문가입니다.

핵심 규정:
[총칙] 제1항: 표준어를 소리대로 적되 어법에 맞도록 함. 제2항: 각 단어는 띄어 씀.
[두음법칙] 녀→여, 뇨→요, 년→연 등
[띄어쓰기] 조사는 붙여쓰기, 의존명사·보조용언은 띄어쓰기
[혼동표현] 오랫만에→오랜만에, 왠지O/웬지X, 어떡해O/어떻해X, 며칠O/몇일X, 금세O/금새X, 이따가O/있다가X, 안 돼O/안 되X, 어이없다O/어의없다X, 설레다O/설레이다X

JSON으로만 응답. 마크다운 없이 순수 JSON:
{"hasErrors":true/false,"correctedText":"교정된 전체 문장","errors":[{"wrong":"틀린표현","right":"올바른표현","type":"맞춤법|띄어쓰기|용례|표현","reason":"쉬운 설명 + 국립국어원 근거","example":"올바른 예시"}],"overallComment":"총평 1-2문장"}`,
      `다음 글을 검사해주세요:\n\n${text}`
    );

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
    const raw = data.content[0].text.replace(/```json\n?|```/g, '').trim();
    showResult(JSON.parse(raw));
  } catch(e) {
    alert('오류: ' + e.message);
    console.error(e);
  } finally {
    document.getElementById('checkBtn').disabled = false;
    document.getElementById('loadingCard').classList.remove('show');
  }
}

function showResult(result) {
  const banner = document.getElementById('scoreBanner');
  document.getElementById('scoreEmoji').textContent = result.hasErrors ? '📌' : '🎉';
  document.getElementById('scoreTitle').textContent = result.hasErrors ? `${result.errors.length}곳을 고쳐드렸어요` : '완벽합니다!';
  document.getElementById('scoreDesc').textContent = result.overallComment || '';
  banner.className = 'score-banner ' + (result.hasErrors ? 'has-errors' : 'perfect');

  let highlighted = result.correctedText;
  (result.errors || []).forEach(e => {
    highlighted = highlighted.replace(new RegExp(escRx(e.right), 'g'), `<mark>${e.right}</mark>`);
  });
  document.getElementById('correctedText').innerHTML = highlighted;

  const errEl = document.getElementById('errorsSection');
  errEl.innerHTML = '';
  if (result.errors?.length) {
    const lbl = document.createElement('div');
    lbl.className = 'sec-label'; lbl.style.marginBottom = '12px'; lbl.textContent = '수정 내역';
    errEl.appendChild(lbl);
    result.errors.forEach((err, i) => {
      const id = `${err.wrong}_${err.right}_${Date.now()}_${i}`;
      const isSaved = isItemSaved(err.wrong, err.right);
      const d = document.createElement('div');
      d.className = 'error-item';
      d.style.animationDelay = (i * 0.05) + 's';
      d.innerHTML = `
        <div class="err-num">${i+1}</div>
        <div class="err-body">
          <div class="err-words">
            <span class="word-wrong">${esc(err.wrong)}</span>
            <span style="color:var(--ink-faint)">→</span>
            <span class="word-right">${esc(err.right)}</span>
            <span class="err-type">${esc(err.type)}</span>
          </div>
          <div class="err-reason">${esc(err.reason)}</div>
          ${err.example ? `<div class="err-example">예) ${esc(err.example)}</div>` : ''}
        </div>
        <button class="btn-star" id="star_${i}" onclick="toggleSave(${JSON.stringify(err)}, 'star_${i}')" title="즐겨찾기 저장">${isSaved ? '⭐' : '☆'}</button>`;
      errEl.appendChild(d);
    });
  }

  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 복사 ──
function copyText() {
  navigator.clipboard.writeText(document.getElementById('correctedText').innerText).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 복사되었습니다!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 교정된 글 복사하기'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── 오늘의 팁 ──
async function loadTips() {
  const body = document.getElementById('tipsBody');
  const btn = document.getElementById('tipsRefreshBtn');
  body.innerHTML = '<div style="text-align:center;padding:16px;color:var(--ink-faint);">✨ 불러오는 중...</div>';
  btn.disabled = true;
  try {
    const res = await callAPI(
`국립국어원 한글 맞춤법 기준으로 맞춤법 팁을 JSON으로만 반환. 마크다운 없이 순수 JSON.
형식: {"tips":[{"wrong":"틀린표현","right":"올바른표현","desc":"20자 이내 쉬운 설명"}]}
규칙: 정확히 6개. 금세/오랜만에/왠지/며칠/어떡해/이따가 등 흔한 예시 절대 금지. 덜 알려진 것 위주. 매번 다른 카테고리(동사혼동/띄어쓰기/발음표기/조사어미/외래어/순우리말)에서 각 1개씩.`,
      `시드: ${Date.now() + Math.floor(Math.random()*99999)}. 6가지 카테고리에서 각 1개씩, 흔하지 않은 팁 6개 주세요.`,
      600
    );
    const data = await res.json();
    const raw = data.content[0].text.replace(/```json\n?|```/g, '').trim();
    const result = JSON.parse(raw);
    body.innerHTML = result.tips.map(t => `
      <div class="tip-item">
        <span class="tip-dot">◆</span>
        <span><b>${esc(t.wrong)} → ${esc(t.right)}</b> &nbsp;${esc(t.desc)}</span>
      </div>`).join('');
  } catch(e) {
    body.innerHTML = '<div style="font-size:0.88rem;color:var(--warn);padding:8px;">팁을 불러오지 못했습니다.</div>';
  } finally {
    btn.disabled = false;
  }
}

// ── 유틸 ──
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escRx(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ── 즐겨찾기 ──
function getSaved() {
  try { return JSON.parse(localStorage.getItem('bareun_saved') || '[]'); } catch { return []; }
}
function setSaved(arr) { localStorage.setItem('bareun_saved', JSON.stringify(arr)); }

function isItemSaved(wrong, right) {
  return getSaved().some(s => s.wrong === wrong && s.right === right);
}

function toggleSave(err, starId) {
  let saved = getSaved();
  const idx = saved.findIndex(s => s.wrong === err.wrong && s.right === err.right);
  const btn = document.getElementById(starId);
  if (idx >= 0) {
    saved.splice(idx, 1);
    if (btn) btn.textContent = '☆';
  } else {
    saved.unshift({
      wrong: err.wrong, right: err.right,
      type: err.type, reason: err.reason,
      savedAt: new Date().toLocaleDateString('ko-KR')
    });
    if (btn) btn.textContent = '⭐';
  }
  setSaved(saved);
  renderSaved();
}

function clearAllSaved() {
  if (!confirm('저장된 항목을 모두 삭제할까요?')) return;
  setSaved([]);
  renderSaved();
}

function deleteSaved(idx) {
  const saved = getSaved();
  saved.splice(idx, 1);
  setSaved(saved);
  renderSaved();
}

function renderSaved() {
  const saved = getSaved();
  const list = document.getElementById('savedList');
  const count = document.getElementById('savedCount');
  count.textContent = saved.length + '개';

  if (!saved.length) {
    list.innerHTML = '<div class="saved-empty">저장된 항목이 없습니다.<br>오류 항목의 ☆ 버튼을 눌러 저장하세요.</div>';
    return;
  }
  list.innerHTML = saved.map((s, i) => `
    <div class="saved-item">
      <div class="saved-item-body">
        <div class="saved-words">
          <span class="saved-wrong">${esc(s.wrong)}</span>
          <span style="color:var(--ink-faint)">→</span>
          <span class="saved-right">${esc(s.right)}</span>
          <span class="saved-type">${esc(s.type)}</span>
        </div>
        <div class="saved-reason">${esc(s.reason)}</div>
        <div class="saved-date">📅 ${s.savedAt}</div>
      </div>
      <button class="btn-del-saved" onclick="deleteSaved(${i})" title="삭제">✕</button>
    </div>`).join('');
}

window.addEventListener('load', () => { loadTips(); renderSaved(); });
</script>
</body>
</html>
